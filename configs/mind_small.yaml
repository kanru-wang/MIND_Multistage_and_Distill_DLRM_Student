run_name: "mind_small_demo"

data:
  raw_root: "data/raw"
  dataset_name: "MINDsmall"
  train_dir: "MINDsmall_train"
  dev_dir: "MINDsmall_dev"
  processed_root: "data/processed"
  max_history: 50
  min_user_hist_for_warm: 5
  min_item_train_clicks_for_warm: 10
  negative_sampling:
    enabled: false  # Use in-impression negatives by default
  sub_sample:
    enabled: false
    train_impressions: 200000
    dev_impressions: 50000
    seed: 13

teacher:
  model_name: "sentence-transformers/all-MiniLM-L6-v2"
  batch_size: 128
  user_attn_heads: 4
  user_attn_dim: 384
  lr: 2.0e-4
  epochs: 8
  early_stopping:
    enabled: true
    patience: 2
    monitor: "retrieval_recall@k"
    min_delta: 1.0e-4
  temperature: 0.07
  negatives_per_positive: 8
  device: "cuda"  # cuda|cpu

retrieval:
  index_type: "flat_ip"  # flat_ip|ivf_flat_ip
  ivf_nlist: 2048
  topk: 200

ranker:
  batch_size: 1024
  lr: 1.0e-3
  weight_decay: 1.0e-6
  epochs: 8
  early_stopping:
    enabled: true
    patience: 2
    min_delta: 1.0e-5
  device: "cuda"
  dlrm:
    emb_dim: 64
    bottom_mlp: [128, 64]
    top_mlp: [256, 128, 1]
    dropout: 0.1
  distill:
    enabled: true
    temperature: 2.0
    lambda_logit: 1.0
    lambda_repr: 0.1
    cold_weight: 2.0
    warm_weight: 0.5
  calibration:
    enabled: true
    lr: 0.05
    max_iter: 100

rerank:
  k_out: 10
  pool_size: 50
  position_bias: "log"  # log|linear
  relevance_weight: 0.90
  novelty_weight: 0.05
  coverage_weight: 0.05
  novelty_sim: "teacher_cosine"  # teacher_cosine|entity_jaccard|category
  coverage:
    max_new_entities_per_item: 3
    category_bonus: 1.0
    entity_bonus: 0.3
  fairness:
    enabled: true
    category_target: "catalog"  # catalog|uniform
    new_item_floor: 0.20  # minimum fraction of exposure in top-k to new items
    penalty_weight: 0.5
  search:
    absolute_guardrails:
      min_ndcg@k: 0.327
      min_new_item_exposure_frac: 0.55
      min_category_coverage: 6.40
      max_fairness_kl_pool: 0.241
    utility_coefficients:
      ndcg_vs_floor_units: 4.0
      new_item_exposure_vs_floor_units: 1.5
      category_coverage_vs_floor_units: 1.0
      fairness_kl_pool_vs_ceiling_units: 1.0

eval:
  ks: [5, 10]
  plot_curves: true
